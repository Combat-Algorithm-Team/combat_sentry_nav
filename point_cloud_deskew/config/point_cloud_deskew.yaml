point_cloud_deskew:
  ros__parameters:
    use_sim_time: false

    input_cloud_topic: "livox/lidar/pointcloud"
    output_cloud_topic: "livox/lidar_deskewed"
    odom_topic: "odin1/odometry_highfreq"

    base_frame: "odin1_base_link"
    lidar_frame: "front_mid360"
    output_frame: "front_mid360"

    # All time parameters below use seconds.
    time_offset_sec: 0.0                 # LiDAR point timestamp offset.
    odom_cache_duration_sec: 2.0         # Odometry cache duration.
    max_odom_gap_sec: 0.10               # Max gap between adjacent odometry samples.
    max_extrapolation_sec: 0.05          # Max extrapolation outside the odometry cache.
    tf_lookup_timeout_sec: 0.05          # TF lookup timeout.
