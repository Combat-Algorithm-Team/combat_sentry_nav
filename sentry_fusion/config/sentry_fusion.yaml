point_cloud_deskew:
  ros__parameters:
    use_sim_time: false

    input_cloud_topic: "livox/lidar/pointcloud"
    output_cloud_topic: "livox/lidar_deskewed"
    publish_deskewed_cloud: false
    enable_fusion: true
    odin_cloud_topic: "odin1/cloud_slam"
    fused_cloud_topic: "registered_scan"
    odom_topic: "odin1/odometry_highfreq"

    base_frame: "odin1_base_link"
    lidar_frame: "front_mid360"
    output_frame: "front_mid360"
    fusion_base_frame: "base_footprint"
    odin_frame: "odin1_base_link"
    livox_frame: "front_mid360"
    fused_output_frame: "odom"

    # All time parameters below use seconds.
    time_offset_sec: 0.0                 # LiDAR point timestamp offset.
    odom_cache_duration_sec: 2.0         # Odometry cache duration.
    fusion_cache_duration_sec: 1.0       # Cache duration for internal cloud fusion.
    sync_tolerance_sec: 0.05             # Max Livox/Odin cloud timestamp delta.
    max_odom_gap_sec: 0.10               # Max gap between adjacent odometry samples.
    max_extrapolation_sec: 0.05          # Max extrapolation outside the odometry cache.
    tf_lookup_timeout_sec: 0.05          # TF lookup timeout.

odom_adapter:
  ros__parameters:
    use_sim_time: false

    input_odometry_topic: "odin1/odometry_highfreq"
    lidar_odometry_topic: "lidar_odometry"
    robot_base_odometry_topic: "odometry"
    base_yaw_joint_topic: "base_yaw_joint_publisher"

    odom_frame: "odom"
    base_frame: "base_footprint"
    robot_base_frame: "base_yaw"
    robot_base_odom_frame: "base_yaw_odom"
    lidar_frame: "odin1_base_link"

    tf_lookup_timeout_sec: 0.05
