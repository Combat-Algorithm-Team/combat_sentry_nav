point_cloud_deskew:
  ros__parameters:
    use_sim_time: false

    input_cloud_topic: "livox/lidar/pointcloud"
    output_cloud_topic: "livox/lidar_deskewed"
    publish_deskewed_cloud: false
    enable_fusion: true
    odin_cloud_topic: "odin1/cloud_raw"
    fused_cloud_topic: "registered_scan"
    odom_topic: "odin1/odometry_highfreq"

    base_frame: "odin1_base_link"       # Odin raw cloud frame and Odin odometry child frame.
    lidar_frame: "front_mid360"         # Livox cloud frame; deskewed output is fixed to this frame.
    fusion_base_frame: "base_footprint" # Static alignment frame used to publish fused clouds in odom.
    fused_output_frame: "odom"          # Frame id of registered_scan.
    # Odin local XY fan filter: 0 deg is +x, positive angle turns toward +y.
    enable_odin_sector_filter: true
    odin_sector_filter_radius_min: 0.0
    odin_sector_filter_radius: 0.8
    odin_sector_filter_angle_center_deg: 0.0
    odin_sector_filter_angle_width_deg: 180.0

    # All time parameters below use seconds.
    time_offset_sec: 0.0                 # Added to each Livox point timestamp before deskew.
    odom_cache_duration_sec: 2.0         # Odin odometry history kept for point interpolation.
    fusion_cache_duration_sec: 1.0       # Livox/Odin cloud history kept while waiting for a pair.
    sync_tolerance_sec: 0.05             # Max allowed Livox/Odin cloud timestamp delta.
    max_odom_gap_sec: 0.10               # Max odometry sample interval allowed for interpolation.
    max_extrapolation_sec: 0.05          # Allowed overrun before/after the odometry cache edge.
    tf_lookup_timeout_sec: 0.05          # TF lookup wait time.

odom_adapter:
  ros__parameters:
    use_sim_time: false

    input_odometry_topic: "odin1/odometry_highfreq"
    lidar_odometry_topic: "lidar_odometry"
    robot_base_odometry_topic: "odometry"
    base_yaw_joint_topic: "base_yaw_joint_publisher"

    odom_frame: "odom"
    base_frame: "base_footprint"
    robot_base_frame: "base_yaw"
    robot_base_odom_frame: "base_yaw_odom"
    lidar_frame: "odin1_base_link"

    tf_lookup_timeout_sec: 0.05
