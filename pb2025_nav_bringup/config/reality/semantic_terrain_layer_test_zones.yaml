# Test-only semantic zones for the standalone semantic terrain layer launch.
#
# These zones are intentionally centered around map origin so the test can run
# without SLAM, real LiDAR, or the full navigation stack. Use RViz to inspect:
# - /costmap/costmap
# - /costmap/costmap_raw
# - /terrain_semantic_markers
frame_id: map

zones:
  - name: test_high_cost_platform
    enabled: true
    type: high_cost
    cost: 170
    state_id: 1
    priority: 50
    polygon:
      - [-1.20, -1.00]
      - [0.20, -1.00]
      - [0.20, 0.80]
      - [-1.20, 0.80]

  - name: test_lethal_43deg_slope
    enabled: true
    type: lethal
    cost: 254
    state_id: 255
    priority: 100
    polygon:
      - [0.70, -1.00]
      - [1.50, -1.00]
      - [1.50, 0.80]
      - [0.70, 0.80]

  - name: test_fortress_slope_intersection_lines
    enabled: true
    type: high_cost
    cost: 230
    state_id: 1
    priority: 75
    line_width: 0.25
    segments:
      - [[-1.80, 1.25], [1.80, 1.25]]
      - [[-1.80, 1.75], [1.80, 1.75]]
