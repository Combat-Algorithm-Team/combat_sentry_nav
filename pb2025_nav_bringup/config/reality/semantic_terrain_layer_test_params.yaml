# Standalone costmap test parameters for pb_nav2_costmap_2d::SemanticPolygonLayer.
# This file is only for visualization/debugging and does not start the real
# sentry navigation stack.

costmap:
  costmap:
    ros__parameters:
      use_sim_time: False
      global_frame: map
      robot_base_frame: base_yaw_odom
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.42
      footprint: "[ [0.32, 0.32], [0.32, -0.32], [-0.32, -0.32], [-0.32, 0.32] ]"
      update_frequency: 2.0
      publish_frequency: 2.0
      transform_tolerance: 0.2
      track_unknown_space: false
      plugins: ["terrain_semantic_layer"]
      terrain_semantic_layer:
        plugin: pb_nav2_costmap_2d::SemanticPolygonLayer
        enabled: true
        zones_file: $(var zones_file)
        use_maximum: true
        update_full_map: true
      always_send_full_costmap: true

terrain_zone_monitor:
  ros__parameters:
    use_sim_time: False
    zones_file: $(var zones_file)
    global_frame: map
    robot_base_frame: base_yaw_odom
    footprint_radius: 0.42
    sample_count: 16
    update_frequency: 10.0
    marker_publish_frequency: 1.0
    normal_state_id: 0
    state_topic: /sentry_terrain_state
    state_name_topic: /sentry_terrain_zone_name
    speed_limit_topic: /sentry_terrain_speed_limit
    marker_topic: /terrain_semantic_markers
    publish_markers: true

terrain_semantic_costmap_lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names: ["costmap/costmap"]
