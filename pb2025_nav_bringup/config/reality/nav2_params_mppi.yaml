      track_unknown_space: true
      plugins: ["static_layer", "terrain_semantic_layer", "intensity_voxel_layer", "inflation_layer"]
      terrain_semantic_layer:
        plugin: combat_nav2_costmap_2d::SemanticPolygonLayer
        enabled: true
        zones_file: $(find-pkg-share pb2025_nav_bringup)/config/reality/terrain_semantic_zones.yaml
        use_maximum: true
        update_full_map: true
      intensity_voxel_layer:
        plugin: combat_nav2_costmap_2d::IntensityVoxelLayer
        enabled: true
        track_unknown_space: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        combination_method: 1
        mark_threshold: 0
        origin_z: 0.0
        unknown_threshold: 5
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: -1.0
        max_obstacle_height: 2.0
        min_obstacle_intensity: 0.1
        max_obstacle_intensity: 2.0
        observation_sources: terrain_map_ext
        terrain_map_ext:
          data_type: PointCloud2
          # '<robot_namespace>' keyword shall be replaced with 'namespace' where user defined.
