# Static semantic terrain zones for RoboMaster sentry navigation.
#
# Frame convention:
# - Coordinates are in the SLAM map frame.
# - In slam:=True mode this relies on the sentry starting from the same pose each run.
# - After each start, check /terrain_semantic_markers in RViz before trusting the zones.
#
# Zone types:
# - high_cost: traversable but avoided by normal planning. Use for fortress/highland tops.
# - slowdown: traversable and reported to the lower computer for speed limiting.
# - lethal: obstacle. Use for the 43-degree highland slope and any no-go ramp face.
#
# state_id convention for /sentry_terrain_state:
# - 0: normal
# - 1: high_cost terrain such as fortress/highland
# - 2: slowdown-only terrain
# - 255: lethal / no-go terrain
#
# The zones below are dimension templates based on the RM2026 V1.4.2 field
# drawings. They are intentionally disabled until their coordinates are shifted
# and rotated onto the SLAM map in RViz.
#
# Fortress template:
# - Center: [0.0, 0.0] in map frame.
# - Outer hexagon: side 1.120 m, flat-to-flat height 1.939 m.
# - Inner platform: side 0.653 m, flat-to-flat height 1.131 m.
# - Height 0.150 m, six surrounding ramp faces are about 20 degrees.
# - The whole outer hexagon is modeled as one traversable high-cost area because
#   the lower computer should slow down anywhere on the fortress. The six narrow
#   intersection lines remain separate with higher cost to bias paths toward the
#   center of each ramp face.
#
# Trapezoid highland template:
# - Local bounding footprint: about 10.505 m x 4.380 m.
# - The points below use the footprint center as [0.0, 0.0].
# - 43-degree slope is modeled as lethal. 23-degree slopes are traversable
#   high-cost regions and should also be speed-limited by the lower computer.
#
# Narrow high-cost lines can be written as:
#   line: [[x0, y0], [x1, y1]]
#   line_width: 0.25
# Or multiple independent line strips can be written as:
#   segments:
#     - [[x0, y0], [x1, y1]]
#     - [[x2, y2], [x3, y3]]
frame_id: map

zones:
  - name: fortress_area
    enabled: false
    type: high_cost
    cost: 175
    state_id: 1
    priority: 55
    polygon:
      - [-0.560, 0.970]
      - [0.560, 0.970]
      - [1.120, 0.000]
      - [0.560, -0.970]
      - [-0.560, -0.970]
      - [-1.120, 0.000]

  - name: fortress_slope_intersection_lines
    enabled: false
    type: high_cost
    cost: 235
    state_id: 1
    priority: 80
    line_width: 0.18
    segments:
      - [[-0.560, 0.970], [-0.327, 0.566]]
      - [[0.560, 0.970], [0.327, 0.566]]
      - [[1.120, 0.000], [0.653, 0.000]]
      - [[0.560, -0.970], [0.327, -0.566]]
      - [[-0.560, -0.970], [-0.327, -0.566]]
      - [[-1.120, 0.000], [-0.653, 0.000]]

  - name: trapezoid_highland_upper_platform
    enabled: false
    type: high_cost
    cost: 150
    state_id: 1
    priority: 45
    polygon:
      - [-4.953, 0.732]
      - [5.253, 0.732]
      - [5.253, 2.190]
      - [-4.953, 2.190]

  - name: trapezoid_highland_lower_platform
    enabled: false
    type: high_cost
    cost: 150
    state_id: 1
    priority: 45
    polygon:
      - [-4.953, -2.040]
      - [-2.892, -2.040]
      - [-2.892, -0.690]
      - [-4.103, -0.690]
      - [-4.103, 0.732]
      - [-4.953, 0.732]

  - name: trapezoid_highland_23deg_main_slope
    enabled: false
    type: high_cost
    cost: 195
    state_id: 1
    priority: 60
    polygon:
      - [-2.892, -2.040]
      - [-0.813, -2.040]
      - [1.455, 0.732]
      - [0.355, 0.732]

  - name: trapezoid_highland_23deg_right_edge
    enabled: false
    type: high_cost
    cost: 190
    state_id: 1
    priority: 60
    polygon:
      - [3.700, 0.732]
      - [4.781, 0.732]
      - [4.781, 1.735]
      - [3.700, 1.735]

  - name: trapezoid_highland_43deg_slope
    enabled: false
    type: lethal
    cost: 254
    state_id: 255
    priority: 100
    polygon:
      - [-4.953, -2.040]
      - [-3.401, -2.040]
      - [-3.401, -0.540]
      - [-4.953, -0.540]
