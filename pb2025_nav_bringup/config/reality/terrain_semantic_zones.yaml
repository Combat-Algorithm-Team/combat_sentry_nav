# Static semantic terrain zones for RoboMaster sentry navigation.
#
# Frame convention:
# - Coordinates are in the SLAM map frame.
# - In slam:=True mode this relies on the sentry starting from the same pose each run.
# - After each start, check /terrain_semantic_markers in RViz before trusting the zones.
#
# Zone types:
# - high_cost: traversable but avoided by normal planning. Use for fortress/highland tops.
# - slowdown: traversable and reported to the lower computer for speed limiting.
# - lethal: obstacle. Use for any no-go terrain.
#
# state_id convention for /cmd_terrain_state:
# - 0: normal
# - 1: fortress and trapezoid highland terrain
# - 2: undulating terrain / slowdown-only traversable segments
# - 255: lethal / no-go terrain
#
# The zones below are based on the RM2026 V1.4.2 field drawings and shifted
# into the fixed-start SLAM map frame.
#
# Fortress template:
# - Center: [2.700, -0.67472] in map frame.
# - Outer hexagon: side 1.120 m, flat-to-flat height 1.939 m.
# - Inner platform: side 0.653 m, flat-to-flat height 1.131 m.
# - Height 0.150 m, six surrounding ramp faces are about 20 degrees.
# - The whole outer hexagon is modeled as one traversable high-cost area because
#   the lower computer should slow down anywhere on the fortress. The six narrow
#   intersection lines remain separate with higher cost to bias paths toward the
#   center of each ramp face.
#
# Undulating road segments:
# - The segment center lines match the RMUC2026 behavior-tree before/after goals.
# - They publish state_id=2 on /cmd_terrain_state for lower-computer terrain
#   handling while leaving fortress and trapezoid highland areas at state_id=1.
# - Each segment is named directly instead of relying on generated _0/_1 suffixes.
#
# Trapezoid highland area:
# - This is a single semantic footprint for the annotated RMUC2026 trapezoid
#   highland instead of separate upper/lower/slope subregions.
# - The points below keep the measured anchors from the previous calibration:
#   left edge x=-0.72610, 23-degree slope lower edge y=1.97588, and highland
#   upper edge y=6.82468.
# - The inner bend is fitted to the rmuc2026.png obstacle edge at about
#   pixel (213, 35), so the adjacent horizontal edge overlays the obstacle
#   boundary instead of floating below it.
# - Check /terrain_semantic_markers in RViz before using it for speed limiting.
#
# Narrow high-cost lines can be written as:
#   line: [[x0, y0], [x1, y1]]
#   line_width: 0.25
# Or multiple independent line strips can be written as:
#   segments:
#     - [[x0, y0], [x1, y1]]
#     - [[x2, y2], [x3, y3]]
frame_id: map

zones:
  - name: fortress_area
    enabled: true
    type: high_cost
    cost: 175
    state_id: 1
    priority: 55
    polygon:
      - [2.140, 0.29528]
      - [3.260, 0.29528]
      - [3.820, -0.67472]
      - [3.260, -1.64472]
      - [2.140, -1.64472]
      - [1.580, -0.67472]

  - name: fortress_slope_intersection_lines
    enabled: true
    type: lethal
    cost: 254
    state_id: 1
    priority: 80
    line_width: 0.1
    segments:
      - [[2.140, 0.29528], [2.373, -0.10872]]
      - [[3.260, 0.29528], [3.027, -0.10872]]
      - [[3.820, -0.67472], [3.353, -0.67472]]
      - [[3.260, -1.64472], [3.027, -1.24072]]
      - [[2.140, -1.64472], [2.373, -1.24072]]
      - [[1.580, -0.67472], [2.047, -0.67472]]

  - name: ally_undulating_road_segment
    enabled: true
    type: slowdown
    cost: 0
    state_id: 2
    priority: 70
    line_width: 2.00
    line: [[-0.100, -7.086], [4.458, -7.086]]

  - name: enemy_undulating_road_segment
    enabled: true
    type: slowdown
    cost: 0
    state_id: 2
    priority: 70
    line_width: 2.00
    line: [[15.675, 5.805], [20.291, 5.805]]

  - name: trapezoid_highland
    enabled: true
    type: high_cost
    cost: 175
    state_id: 1
    priority: 60
    polygon:
      - [-0.72610, 6.82468]
      - [9.47990, 6.82468]
      - [9.47990, 5.56923]
      - [5.87548, 5.56923]
      - [3.41390, 1.97588]
      - [-0.72610, 1.97588]

  - name: trapezoid_highland_inner_corner_lethal_lines
    enabled: true
    type: lethal
    cost: 254
    state_id: 1
    priority: 90
    line_width: 0.10
    segments:
      - [[2.86390, 1.97588], [3.72479, 2.42954]]
      - [[5.56459, 5.11557], [6.42548, 5.56923]]
